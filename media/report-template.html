<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>代码审查报告 · {{DATE}}</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --code-bg: rgba(15, 23, 42, 0.06);
      --pre-bg: #0b1220;
      --pre-text: #e5e7eb;
      --pre-border: rgba(148, 163, 184, 0.22);
      --nav-bg: #ffffff;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 20px rgba(15, 23, 42, 0.06);
      /* 报告头 */
      --radius-panel: 14px;
      /* 审查条目 .card 与侧栏（与正文白卡片一致） */
      --radius-card: 12px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 35%, #e2e8f0 100%);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
    }
    .page {
      --sidebar-w: min(320px, 34vw);
      display: flex;
      max-width: min(1680px, 100%);
      margin-left: 0;
      margin-right: auto;
      align-items: flex-start;
      min-height: 100vh;
      flex-direction: row-reverse;
      padding: 0 max(0.5rem, env(safe-area-inset-right)) 0 max(0.75rem, env(safe-area-inset-left));
    }
    .main-wrap {
      flex: 1;
      min-width: 0;
      padding: 2rem 1rem 3rem 1.25rem;
    }
    .wrap-inner {
      max-width: none;
      width: 100%;
      margin: 0;
    }
    .side-nav {
      width: var(--sidebar-w);
      min-width: 260px;
      flex-shrink: 0;
      position: sticky;
      top: 12px;
      margin-top: 2rem;
      align-self: flex-start;
      max-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      padding: 1.25rem 0 2rem;
    }
    .side-nav-inner { padding: 0 0.9rem 0 1.05rem; }
    .side-nav::-webkit-scrollbar { width: 10px; }
    .side-nav::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.28);
      border-radius: 999px;
    }
    .side-nav::-webkit-scrollbar-track { background: rgba(2, 6, 23, 0.06); }
    .nav-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.8rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .side-nav ol {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .side-nav li { margin: 0 0 0.3rem; }
    .side-nav a {
      display: block;
      padding: 0.5rem 0.55rem;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.82rem;
      line-height: 1.45;
      border: 1px solid transparent;
      word-break: break-word;
      overflow-wrap: anywhere;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.12s;
    }
    .side-nav a:hover {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 18%, transparent);
      transform: translateY(-1px);
    }
    .side-nav a:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--accent) 55%, transparent);
      outline-offset: 2px;
    }
    .nav-top {
      display: block;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .nav-top:hover { text-decoration: underline; }
    .hero {
      margin-bottom: 1.75rem;
      padding: 1.5rem 1.35rem;
      border-radius: var(--radius-panel);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .hero h1 { margin: 0 0 0.4rem; font-size: 1.45rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
    .hero .meta { color: var(--muted); font-size: 0.9rem; margin: 0.35rem 0 0; }
    .hero .meta code {
      color: var(--accent);
      font-size: 0.82em;
      background: var(--accent-soft);
      padding: 0.12em 0.4em;
      border-radius: 6px;
      border: 1px solid var(--border);
      word-break: break-all;
    }
    .filter-hint { color: var(--muted); font-weight: 400; }
    /* 侧栏顶部：与导航同宽 */
    .side-nav .author-filter {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.45rem;
      width: 100%;
      margin: 0 0 1rem;
      padding: 0.75rem 0;
      border-radius: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
    }
    .side-nav .author-filter label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
    }
    .side-nav .author-select {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      padding: 0.45rem 0.5rem;
      font-size: 0.82rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }
    .side-nav .author-select:focus {
      outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);
      outline-offset: 1px;
    }
    .card {
      margin-bottom: 1.25rem;
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      box-shadow: var(--shadow);
      scroll-margin-top: 1rem;
    }
    .card-head {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1rem 1.15rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fafbfc 0%, var(--surface) 100%);
    }
    .card-idx {
      flex-shrink: 0;
      width: 1.75rem;
      height: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid #bfdbfe;
    }
    .card-title-wrap { min-width: 0; }
    .card-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      white-space: pre-wrap; /* 保留 REVISION 头部里的 \t 视觉间距 */
      word-break: break-word;
    }
    .card-author {
      margin-top: 0.15rem;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }
    .md-body { padding: 1.15rem 1.25rem 1.35rem; font-size: 0.95rem; color: var(--text); }
    .md-body .empty { color: var(--muted); font-style: italic; margin: 0; }
    .md-body :first-child { margin-top: 0; }
    .md-body :last-child { margin-bottom: 0; }
    .md-body h1, .md-body h2, .md-body h3 { color: var(--text); margin-top: 1.1em; margin-bottom: 0.4em; font-weight: 600; }
    .md-body h1 { font-size: 1.2rem; }
    .md-body h2 { font-size: 1.1rem; }
    .md-body h3 { font-size: 1rem; }
    /* 标题（用于标记为“不要用 h2”的内容） */
    .md-body .md-h2 {
      color: var(--text);
      font-size: inherit;
      font-weight: inherit;
      margin: 0.65em 0;
    }
    /* 让二级标题与正文一致（避免放大/加粗） */
    .md-body h2 {
      font-size: inherit;
      font-weight: inherit;
      color: var(--text);
      margin: 0.65em 0;
    }
    /* “一个问题”分组容器：文件名/问题代码/修改建议一组，并与下一组分割 */
    .md-body .review-problem {
      margin: 1.05rem 0;
      padding: 0.95rem 1.05rem 1.05rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }
    .md-body .review-problem + .review-problem {
      border-top: 1px solid var(--border);
    }

    /* 审查结构标题（由 extension.js 识别 [文件名]/[问题代码]/[修改建议] 后添加） */
    .md-body .review-section-title {
      display: block;
      margin: 0.15rem 0 0.4rem !important;
      padding: 0 !important;
      border: none !important;
      border-left-width: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      font-size: 0.95rem !important;
      font-weight: 650 !important;
      line-height: 1.45;
      color: var(--text);
      background: transparent !important;
    }
    .md-body p.md-h2.review-section-title {
      margin: 0.15rem 0 0.4rem !important;
    }
    .md-body .review-section-title__inner {
      display: inline;
      align-items: center;
      gap: 0;
    }
    .md-body .review-section-title--file { color: #2563eb; }
    .md-body .review-section-title--code { color: #ea580c; }
    .md-body .review-section-title--suggest { color: #059669; }
    .md-body .review-section-follow { margin-top: 0.25em; }
    .md-body p { margin: 0.65em 0; }
    .md-body ul, .md-body ol { margin: 0.65em 0; padding-left: 1.35rem; }
    .md-body li { margin: 0.25em 0; }
    /* 行内 code 与代码块区分：行内更浅背景，代码块走 pre 的深色背景 */
    .md-body code {
      font-family: "Cascadia Code", "Consolas", ui-monospace, monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 5px;
      border: 1px solid var(--border);
      color: #0f172a;
    }
    .md-body pre code {
      color: var(--pre-text);
    }
    .md-body pre {
      margin: 0.85em 0;
      padding: 0.95rem 1.05rem;
      overflow-x: auto;
      border-radius: 12px;
      background: var(--pre-bg);
      border: 1px solid var(--pre-border);
      font-size: 0.86rem;
      line-height: 1.55;
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.18);
    }
    .md-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
      color: var(--pre-text);
      display: block;
      white-space: pre;
    }
    .md-body pre::-webkit-scrollbar { height: 10px; }
    .md-body pre::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.25);
      border-radius: 999px;
    }
    .md-body pre::-webkit-scrollbar-track { background: rgba(2, 6, 23, 0.25); }
    .md-body pre code .token.comment,
    .md-body pre code .token.prolog,
    .md-body pre code .token.doctype,
    .md-body pre code .token.cdata {
      color: #64748b;
      font-style: italic;
    }
    .md-body pre code .token.punctuation { color: #94a3b8; }
    .md-body pre code .token.property,
    .md-body pre code .token.attr-name,
    .md-body pre code .token.tag,
    .md-body pre code .token.symbol,
    .md-body pre code .token.deleted,
    .md-body pre code .token.inserted { color: #38bdf8; }
    .md-body pre code .token.boolean,
    .md-body pre code .token.number,
    .md-body pre code .token.constant { color: #fbbf24; }
    .md-body pre code .token.deleted { color: #fb7185; }
    .md-body pre code .token.inserted { color: #34d399; }
    .md-body pre code .token.keyword,
    .md-body pre code .token.operator,
    .md-body pre code .token.atrule,
    .md-body pre code .token.function { color: #2dd4bf; }
    .md-body pre code .token.parameter { color: inherit; }
    .md-body pre code .token.class-name,
    .md-body pre code .token.type,
    .md-body pre code .token.selector { color: #3b82f6; }
    .md-body pre code .token.string,
    .md-body pre code .token.char,
    .md-body pre code .token.builtin,
    .md-body pre code .token.regex,
    .md-body pre code .token.attr-value { color: #34d399; }
    .md-body pre code .token.function-name { color: #a78bfa; }
    .md-body pre code .token.regex,
    .md-body pre code .token.number { color: #fbbf24; }

    /* highlight.js token set */
    .md-body pre code .hljs-comment,
    .md-body pre code .hljs-quote { color: #64748b; font-style: italic; }
    .md-body pre code .hljs-keyword,
    .md-body pre code .hljs-selector-tag,
    .md-body pre code .hljs-subst,
    .md-body pre code .hljs-title,
    .md-body pre code .hljs-section { color: #2dd4bf; font-weight: 600; }
    .md-body pre code .hljs-string,
    .md-body pre code .hljs-title.class_,
    .md-body pre code .hljs-name,
    .md-body pre code .hljs-attr,
    .md-body pre code .hljs-attribute,
    .md-body pre code .hljs-bullet { color: #34d399; }
    .md-body pre code .hljs-number,
    .md-body pre code .hljs-regexp { color: #fbbf24; }
    .md-body pre code .hljs-variable,
    .md-body pre code .hljs-literal,
    .md-body pre code .hljs-builtin { color: #4ea1ff; }
    .md-body pre code .hljs-params { color: inherit; font-weight: inherit; }
    .md-body pre code .hljs-operator,
    .md-body pre code .hljs-punctuation { color: #94a3b8; }

    .md-body .md-fallback { color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .md-body blockquote {
      margin: 0.75em 0;
      padding: 0.4em 0 0.4em 1rem;
      border-left: 3px solid var(--accent);
      color: var(--muted);
      background: var(--accent-soft);
    }
    .md-body table { border-collapse: collapse; width: 100%; margin: 0.75em 0; font-size: 0.9rem; }
    .md-body th, .md-body td { border: 1px solid var(--border); padding: 0.45em 0.65em; text-align: left; }
    .md-body th { background: #f8fafc; color: var(--text); }
    footer.footer {
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }
    @media (max-width: 900px) {
      .page { flex-direction: column; }
      .side-nav {
        width: 100%;
        position: relative;
        max-height: none;
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow);
        order: -1;
        margin-top: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="main-wrap">
      <div class="wrap-inner">
        <header class="hero">
          <h1>代码审查报告</h1>
          <p class="meta">日期 <strong>{{DATE}}</strong> · 共 <strong>{{BLOCK_COUNT}}</strong> 条<span id="filter-count-hint" class="filter-hint" hidden> · 当前显示 <strong id="visible-count">0</strong> 条</span></p>
          <p class="meta">源文件 <code>{{SOURCE_PATH}}</code></p>
        </header>
        <main>
{{CARDS}}
        </main>
        <footer class="footer">由 Auto Code Review 生成 · {{GENERATED}}</footer>
      </div>
    </div>
    <aside class="side-nav" aria-label="本页导航">
      <div class="side-nav-inner">
        {{AUTHOR_FILTER}}
        <p class="nav-title">跳转到条目</p>
        <ol>
{{NAV_ITEMS}}
        </ol>
        <a class="nav-top" href="#">↑ 返回顶部</a>
      </div>
    </aside>
  </div>
  <script>
(function () {
  var sel = document.getElementById('author-filter');
  if (!sel) return;
  var cards = document.querySelectorAll('main .card');
  var navItems = document.querySelectorAll('.side-nav ol li.nav-item');
  var hint = document.getElementById('filter-count-hint');
  var vis = document.getElementById('visible-count');
  function apply() {
    var v = sel.value;
    var n = 0;
    cards.forEach(function (el) {
      var a = el.getAttribute('data-author') || '';
      var show = !v || (v === '__EMPTY__' ? a === '' : a === v);
      el.style.display = show ? '' : 'none';
      if (show) n++;
    });
    navItems.forEach(function (el) {
      var a = el.getAttribute('data-author') || '';
      var show = !v || (v === '__EMPTY__' ? a === '' : a === v);
      el.style.display = show ? '' : 'none';
    });
    if (hint && vis) {
      if (!v) {
        hint.hidden = true;
      } else {
        hint.hidden = false;
        vis.textContent = String(n);
      }
    }
  }
  sel.addEventListener('change', apply);
})();
  </script>
</body>
</html>
